<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     role="img" aria-label="LiveChat Hub — the AI-provider-agnostic live chat frontend platform">
  <title>LiveChat Hub</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16259E"/>
      <stop offset="0.42" stop-color="#241F4A"/>
      <stop offset="1" stop-color="#0A0E22"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#37A6FF" stop-opacity="0.85"/>
      <stop offset="0.55" stop-color="#1856FF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1856FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink" x1="400" y1="120" x2="400" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DCE6FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8FB6FF"/>
      <stop offset="1" stop-color="#4D7BFF"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="46"/>
    </filter>
    <clipPath id="card"><rect x="0" y="0" width="1280" height="400" rx="26"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <rect x="0" y="0" width="1280" height="400" fill="url(#bg)"/>

    <!-- ambient orbs (frosted-glass-over-rich-background) -->
    <circle cx="170" cy="120" r="180" fill="#1F6BFF" fill-opacity="0.55" filter="url(#soft)"/>
    <circle cx="1140" cy="350" r="210" fill="#6D5BFF" fill-opacity="0.40" filter="url(#soft)"/>
    <circle cx="900" cy="40"  r="150" fill="#21C7FF" fill-opacity="0.22" filter="url(#soft)"/>

    <!-- faint floating chat-bubble motifs -->
    <g stroke="#FFFFFF" stroke-opacity="0.12" fill="none" stroke-width="2">
      <path d="M1018 70 h150 a16 16 0 0 1 16 16 v54 a16 16 0 0 1 -16 16 h-92 l-30 26 v-26 h-28 a16 16 0 0 1 -16 -16 v-54 a16 16 0 0 1 16 -16 z"/>
      <path d="M196 300 h96 a14 14 0 0 1 14 14 v34 a14 14 0 0 1 -14 14 h-58 l-24 20 v-20 h-14 a14 14 0 0 1 -14 -14 v-34 a14 14 0 0 1 14 -14 z"/>
    </g>

    <!-- bot mascot on a soft glass disc -->
    <circle cx="218" cy="196" r="150" fill="url(#glow)"/>
    <circle cx="218" cy="196" r="112" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <image xlink:href="data:image/png;base64," x="120" y="98" width="196" height="196"/>
    <!-- live status dot -->
    <circle cx="298" cy="120" r="13" fill="#0A0E22"/>
    <circle cx="298" cy="120" r="8" fill="#07CA6B"/>

    <!-- wordmark -->
    <text x="398" y="178" font-family="'Plus Jakarta Sans','Segoe UI',system-ui,-apple-system,Roboto,sans-serif" font-size="82" font-weight="800"
          letter-spacing="-2.2"><tspan fill="url(#ink)">LiveChat</tspan><tspan dx="24" fill="url(#accent)">Hub</tspan></text>

    <!-- tagline -->
    <text x="402" y="232" font-family="'Plus Jakarta Sans','Segoe UI',system-ui,-apple-system,Roboto,sans-serif" font-size="22.5" font-weight="500"
          fill="#FFFFFF" fill-opacity="0.78">The AI-provider-agnostic live chat frontend — one widget, any agent.</text>

    
    <g>
      <rect x="400" y="286" width="168" height="36" rx="18"
            fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.16"/>
      <text x="484" y="309" text-anchor="middle"
            font-family="'Plus Jakarta Sans','Segoe UI',system-ui,-apple-system,Roboto,sans-serif" font-size="15.5" font-weight="600"
            fill="#FFFFFF" fill-opacity="0.92">AG-UI Protocol</text>
    </g>
    
    <g>
      <rect x="580" y="286" width="104" height="36" rx="18"
            fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.16"/>
      <text x="632" y="309" text-anchor="middle"
            font-family="'Plus Jakarta Sans','Segoe UI',system-ui,-apple-system,Roboto,sans-serif" font-size="15.5" font-weight="600"
            fill="#FFFFFF" fill-opacity="0.92">React 19</text>
    </g>
    
    <g>
      <rect x="696" y="286" width="116" height="36" rx="18"
            fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.16"/>
      <text x="754" y="309" text-anchor="middle"
            font-family="'Plus Jakarta Sans','Segoe UI',system-ui,-apple-system,Roboto,sans-serif" font-size="15.5" font-weight="600"
            fill="#FFFFFF" fill-opacity="0.92">Zustand 5</text>
    </g>
    
    <g>
      <rect x="824" y="286" width="138" height="36" rx="18"
            fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.16"/>
      <text x="893" y="309" text-anchor="middle"
            font-family="'Plus Jakarta Sans','Segoe UI',system-ui,-apple-system,Roboto,sans-serif" font-size="15.5" font-weight="600"
            fill="#FFFFFF" fill-opacity="0.92">Tailwind v4</text>
    </g>
    
    <g>
      <rect x="974" y="286" width="146" height="36" rx="18"
            fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.16"/>
      <text x="1047" y="309" text-anchor="middle"
            font-family="'Plus Jakarta Sans','Segoe UI',system-ui,-apple-system,Roboto,sans-serif" font-size="15.5" font-weight="600"
            fill="#FFFFFF" fill-opacity="0.92">Shadow DOM</text>
    </g>

    <!-- glass card hairline -->
    <rect x="1" y="1" width="1278" height="398" rx="25" fill="none" stroke="#FFFFFF" stroke-opacity="0.10"/>
  </g>
</svg>
